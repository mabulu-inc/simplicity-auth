name: resolve_session
language: plpgsql
volatility: stable
security: definer
# A PURE resolver. Given a session token hash, it returns the session's
# user, its expiry, the user's selectable roles (split from privileges by
# roles.is_privilege), and the user's privileges. It takes NO role
# argument and validates NOTHING — not expiry, not revocation, not role
# membership. All of that lives in withSession (TS), so this SECURITY
# DEFINER surface stays a minimal read.
#
#   roles        — selectable mode/persona roles (is_privilege = false)
#   default_role — the role names a NULL roleName falls back to (the first
#                  is_default role), or NULL if the user has no default
#   privileges   — always-on capability flags (is_privilege = true)
#
# Soft-delete aware: a soft-deleted session, communication method, or user
# is treated as non-existent (excluded), and soft-deleted role assignments /
# roles are dropped from the aggregates.
#
# Returns zero rows when no live session matches the hash (withSession maps
# that to SessionNotFound). Returns one row with empty arrays when the
# session exists but the user holds no roles.
returns: TABLE(user_id bigint, expires_at timestamptz, roles text[], default_role text, privileges text[])
args:
  - name: p_token_hash
    type: text
body: |
  BEGIN
    RETURN QUERY
    WITH found_session AS (
      SELECT s.expires_at, ucm.user_id
      FROM sessions s
      JOIN user_communication_methods ucm
        ON ucm.user_communication_method_id = s.user_communication_method_id
      JOIN users u ON u.user_id = ucm.user_id
      WHERE s.session_id = p_token_hash
        AND s.deleted_at IS NULL
        AND ucm.deleted_at IS NULL
        AND u.deleted_at IS NULL
    ),
    role_data AS (
      SELECT DISTINCT r.name::text AS name, r.is_default, r.is_privilege
      FROM found_session fs
      JOIN user_roles ur ON ur.user_id = fs.user_id AND ur.deleted_at IS NULL
      JOIN roles r ON r.role_id = ur.role_id AND r.deleted_at IS NULL
    )
    SELECT
      fs.user_id,
      fs.expires_at,
      COALESCE(
        (SELECT array_agg(rd.name ORDER BY rd.name) FROM role_data rd WHERE NOT rd.is_privilege),
        '{}'::text[]
      ),
      (SELECT rd.name FROM role_data rd WHERE NOT rd.is_privilege AND rd.is_default ORDER BY rd.name LIMIT 1),
      COALESCE(
        (SELECT array_agg(rd.name ORDER BY rd.name) FROM role_data rd WHERE rd.is_privilege),
        '{}'::text[]
      )
    FROM found_session fs;
  END;
comment: >
  SECURITY DEFINER pure resolver for sessions — bypasses RLS on auth
  tables so app_user can read session → user → roles without GUCs set
  first. Returns aggregate role/privilege info only (no raw PII); does
  no validation (expiry, revocation, and role selection live in
  withSession).
