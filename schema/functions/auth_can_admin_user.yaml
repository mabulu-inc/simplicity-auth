name: auth_can_admin_user
language: plpgsql
volatility: stable
security: definer
# True when the current actor is a security admin for at least one tenant the
# target user holds a role in — i.e. they share a tenant where the actor holds
# `security`. This is the "a security admin manages the users in their tenants"
# rule, used by the users and user_communication_methods policies.
returns: boolean
args:
  - name: target_user_id
    type: bigint
body: |
  BEGIN
    RETURN EXISTS (
      SELECT 1
      FROM user_roles t
      WHERE t.user_id = target_user_id
        AND t.deleted_at IS NULL
        AND auth_has_role('security', t.tenant_id)
    );
  END;
comment: >
  True if the current actor holds the security role over a tenant the target
  user belongs to. SECURITY DEFINER so RLS policies can call it without
  recursing on user_roles.
