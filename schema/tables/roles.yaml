table: roles
mixins: [audit, soft_delete]
# Grants. Reference data: the request role reads it; only the migration owner
# writes it (seeded). No INSERT/UPDATE for app_rls.
grants:
  - to: app_rls
    privileges: [SELECT]
columns:
  - name: role_id
    type: bigserial
    primary_key: true
  - name: name
    type: varchar(50)
    nullable: false
  # Human-friendly label for UI (role switcher, admin screens).
  - name: display_name
    type: text
  - name: description
    type: text
  # The role withSession auto-selects when no roleName is requested AND the
  # user holds more than one role. A user who holds exactly one role always
  # gets that one (default or not), so is_default only breaks ties for
  # multi-role users. An app should mark exactly one is_privilege=false role as
  # default; the library picks the first default it finds.
  - name: is_default
    type: boolean
    nullable: false
    default: false
  # is_privilege=false → a selectable mode/persona role. These drive the
  #   role switcher and become app.active_role for the request.
  # is_privilege=true  → an always-on capability flag. These are never
  #   "selected"; every privilege the user holds is exported in
  #   app.privileges for the request.
  - name: is_privilege
    type: boolean
    nullable: false
    default: false
indexes:
  # Partial so a role name can be reused after the row is soft-deleted.
  - columns: [name]
    unique: true
    where: 'deleted_at IS NULL'
    name: roles_name_key
# The canonical role names shipped with @smplcty/auth. The library never
# references roles by id — it always looks them up by name — so no ids are
# pinned here: the seeds carry no role_id, and schema-flow matches them by
# their natural columns (the partial-unique index on `name` backstops any
# duplicate). Consumers add their own roles by name; there are no reserved
# id ranges to avoid.
#
# Seeds are insert-only (schema-flow >= 0.13.0 never overwrites an existing
# row), so re-running this migration against an already-seeded database is a
# no-op — and a consumer's edits to these standard roles are never clobbered.
seeds:
  - name: 'user'
    display_name: 'User'
    description: 'Standard signed-in user.'
    is_default: true
    is_privilege: false
  - name: 'settings'
    display_name: 'Settings'
    description: 'Account and organisation settings access.'
    is_default: false
    is_privilege: false
  - name: 'security'
    display_name: 'Security'
    description: 'Security administration.'
    is_default: false
    is_privilege: false
