table: tenants
mixins: [audit, soft_delete]
# Grants. RLS-gated writes by the request role.
grants:
  - to: app_rls
    privileges: [SELECT, INSERT, UPDATE]
columns:
  - name: tenant_id
    type: bigserial
    primary_key: true
  - name: name
    type: text
    nullable: false
  # Sub-domain / URL slug, e.g. "acme" in acme.app.com. The app parses the
  # request Host to this slug; the method router resolves slug → tenant →
  # its auth_domains, so OIDC sign-in needs no "which org are you?" form.
  # Nullable: multitenancy (and sub-domains) are optional for simple apps.
  - name: slug
    type: text
  # Whether user-bound OTP (Twilio) sign-in is allowed for this tenant.
  # Irrelevant when the tenant has no auth_domain (OTP is the only way);
  # set false to enforce SSO-only on a tenant that has OIDC. Enforced in the
  # router, not just the UI.
  - name: allow_otp
    type: boolean
    nullable: false
    default: true
indexes:
  # Partial so a tenant name can be reused after the row is soft-deleted.
  - columns: [name]
    unique: true
    where: 'deleted_at IS NULL'
    name: tenants_name_key
  # Sub-domain slug is unique among live tenants.
  - columns: [slug]
    unique: true
    where: 'deleted_at IS NULL'
    name: tenants_slug_key
# RLS. A tenant is visible to anyone with access to it (any role). Maintaining a
# tenant — including archiving it via deleted_at — requires holding `settings`
# over it; creating a tenant is a global act and requires holding `settings`
# globally (auth_has_role('settings', NULL) only matches a wildcard assignment).
# There is no hard-DELETE policy: tenants are soft-deleted like every auth table.
rls: true
policies:
  - name: tenants_select
    for: SELECT
    to: app_rls
    permissive: true
    using: auth_in_tenant(tenants.tenant_id)
  - name: tenants_insert
    for: INSERT
    to: app_rls
    permissive: true
    check: auth_has_role('settings', NULL::bigint)
  - name: tenants_update
    for: UPDATE
    to: app_rls
    permissive: true
    using: auth_has_role('settings', tenants.tenant_id)
    check: auth_has_role('settings', tenants.tenant_id)
