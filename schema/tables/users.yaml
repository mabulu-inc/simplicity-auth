table: users
# Auditable. The `audit` mixin is consumed from @smplcty/schema-std and adds
# created_at / updated_at / created_by / updated_by (the _by columns FK back
# to users — a self-reference). The audit triggers stamp created_by/updated_by
# from app.actor_id, so seeding any user requires an actor: see the app-init
# seed below + the perTxSqlPath note in schema-flow.config.yaml.
mixins: [audit, soft_delete]
columns:
  - name: user_id
    type: bigserial
    primary_key: true
  - name: name
    type: text
  # 'human'   → a person who signs in and holds a session.
  # 'service' → a background principal (ingestion, transform-worker,
  #   app-init). Service rows are the actor for background writes so
  #   audit attribution (app.actor_id) is never NULL. They never own a
  #   session. See withServiceContext.
  - name: kind
    type: text
    nullable: false
    default: "'human'"
    check: "kind IN ('human', 'service')"
indexes:
  # Service users are principals resolved by name (audit_backfill_by looks up
  # WHERE name = … AND kind = 'service'; see withServiceContext), so two live
  # service rows sharing a name would make that lookup ambiguous. Enforce
  # uniqueness of the name among live service users only. Humans are NOT
  # constrained — real people legitimately share names and are referenced by
  # id, never by name. Partial on deleted_at so a name frees up after the row
  # is soft-deleted.
  - columns: [name]
    unique: true
    where: "kind = 'service' AND deleted_at IS NULL"
    name: users_service_name_key
# The bootstrap principal: the app-init service user. It's the actor every
# migration-time seed (this row, the standard roles, any consumer seeds) is
# attributed to via app.actor_id, resolved by name — `audit_backfill_by`
# looks it up with `WHERE name = 'app-init' AND kind = 'service'`, never by a
# fixed id. It seeds first (users seed before tables that FK to it) and stamps
# its own created_by (the self-reference resolves because the row exists by the
# time the FK is checked). No id is pinned: the seed has no primary key, so
# schema-flow matches it on (name, kind) and re-runs are a no-op.
seeds:
  - name: 'app-init'
    kind: 'service'
seeds_on_conflict: 'DO NOTHING'
