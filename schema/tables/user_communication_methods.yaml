table: user_communication_methods
mixins: [audit, soft_delete]
# Grants. RLS-gated writes by the request role.
grants:
  - to: app_rls
    privileges: [SELECT, INSERT, UPDATE]
columns:
  - name: user_communication_method_id
    type: bigserial
    primary_key: true
  - name: user_id
    type: bigint
    nullable: false
    references:
      table: users
      column: user_id
  - name: communication_channel_id
    type: bigint
    nullable: false
    references:
      table: communication_channels
      column: communication_channel_id
  - name: code
    type: text
    nullable: false
  # Optional, consumer-defined free-text label distinguishing multiple methods
  # of the same channel (e.g. "work" vs "home" phone). The library never
  # interprets, requires, or populates it — it exists so consumers don't carry a
  # ucm extend solely for this one column. NULL when unset.
  - name: qualifier
    type: text
    nullable: true
indexes:
  # Partial so a (channel, code) can be reused after the row is soft-deleted.
  - columns: [communication_channel_id, code]
    unique: true
    where: 'deleted_at IS NULL'
    name: user_communication_methods_channel_code_key
# RLS. A communication method follows its owning user: you manage your own, and
# a security admin manages those of users they administer (auth_can_admin_user).
# Since a plain user can only "see" themselves, they can only touch their own
# contact methods; a security admin reaches every user in their tenants.
rls: true
policies:
  - name: user_communication_methods_access
    for: ALL
    to: app_rls
    permissive: true
    using: |-
      user_communication_methods.user_id = current_user_id()
      OR auth_can_admin_user(user_communication_methods.user_id)
    check: |-
      user_communication_methods.user_id = current_user_id()
      OR auth_can_admin_user(user_communication_methods.user_id)
