# The grants every @smplcty/auth table needs: the app role gets full CRUD on
# all of them. Reads and writes go through the app/admin pool, which runs with
# app_user's privileges — a missing grant surfaces only in staging/prod (the
# test admin pool is a superuser that holds every grant), so the library owns
# these rather than leaving each consumer to re-derive them and miss one.
#
# Shipped as a mixin so a new auth table arrives with its grants already correct
# just by listing `auth_grants` — no per-app grant-only extend to write. Granting
# INSERT/UPDATE makes schema-flow auto-derive the matching `USAGE, SELECT` grant
# on each serial/bigserial sequence, so INSERTs don't trip a sequence-permission
# error.
#
# Grants target app_user, which the consuming app (or its infra) must
# provision — the library grants to the role but deliberately does NOT declare
# it, so it never collides with the consumer's own role declaration. The name
# is fixed, not parameterized: a consumer whose login role is named differently
# creates app_user and grants it to that role (GRANT app_user TO <role>) rather
# than renaming the grant target.
mixin: auth_grants
grants:
  - to: app_user
    privileges: [SELECT, INSERT, UPDATE, DELETE]
