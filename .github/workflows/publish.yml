# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish to npm

# Triggered by creating a GitHub Release. The release tag (e.g. v0.1.1)
# determines what gets published — the workflow checks out the tagged
# commit and verifies that package.json's version matches.
on:
  release:
    types: [published]

# id-token: write is required for npm trusted publishing via OIDC.
# The runner mints a short-lived OIDC ID token, exchanges it at the
# npm registry for a publish credential, and publishes — no long-lived
# NPM_TOKEN secret is stored anywhere.
permissions:
  contents: read
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Test, build, and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The "npm" GitHub Actions environment is the trust boundary on the
    # GitHub side. It must exist in the repo settings (Settings →
    # Environments) and be referenced by name in the npm trusted
    # publisher configuration.
    environment: npm

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54320:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out code at the release tag
        uses: actions/checkout@v6
        with:
          # Full git history so the gitleaks step below can scan
          # every commit, not just the release tree, and so the
          # "tag on main" ancestry check below can walk the graph.
          fetch-depth: 0

      # Refuse to publish unless the release tag's commit is reachable
      # from main. Catches accidental release-it runs from a feature
      # branch before it's merged — npm gets a clean, main-derived
      # release, never a dangling-branch one.
      - name: Refuse to publish if tag isn't on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Tag ${{ github.ref_name }} (commit ${{ github.sha }}) is not reachable from main. Refusing to publish. Re-run the release from main."
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Defense in depth: scan for leaked secrets even on release.
      # ci.yml runs gitleaks on every PR and push to main, but a
      # secret could in theory land via direct push, force-push, or
      # admin override. This step ensures it never reaches the npm
      # tarball — failing here prevents the publish.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks (full git history)
        run: gitleaks git . --no-banner --redact

      - name: Verify release tag matches package.json version
        run: |
          TAG="${GITHUB_REF##refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag and package.json version match: $PKG"

      - name: Type-check
        run: pnpm run typecheck

      - name: Run tests against Postgres service
        env:
          # When DATABASE_URL is set, the vitest globalSetup skips
          # docker-compose and uses this connection directly.
          DATABASE_URL: postgresql://postgres:postgres@localhost:54320/postgres
        run: pnpm test

      - name: Build distribution
        run: pnpm run build

      # No NODE_AUTH_TOKEN — npm publish exchanges the GitHub OIDC token
      # for a short-lived publish credential via the trusted publisher
      # configured at https://www.npmjs.com/package/@smplcty/auth/access
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
