services:
  postgres:
    image: postgres:16-alpine
    ports:
      # Bind to a fixed local port. Picked to avoid colliding with
      # @smplcty/schema-flow's own e2e setup which uses 54329, and any
      # default Postgres on 5432.
      - '54320:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 5s
      retries: 10
